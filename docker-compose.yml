services:
  ollama:
    image: ollama/ollama:latest
    container_name: delegation-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: delegation-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    command: ["pull", "${OLLAMA_MODEL:-llama3.2:3b}"]
    restart: "no"

volumes:
  ollama-data: